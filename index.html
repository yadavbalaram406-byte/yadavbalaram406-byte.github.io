<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>LeoBritney | Why So Serious?</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      background-image: 
        radial-gradient(ellipse at top, #1a1a2e 0%, transparent 50%),
        linear-gradient(180deg, #0a0a0a 0%, #0f0f1a 100%);
      color: #00ff41;
      font-family: 'Orbitron', monospace;
      overflow-x: hidden;
      position: relative;
    }

    /* Scanline effect */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* Matrix rain background */
    .matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.1;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 20px;
      gap: 24px;
    }

    /* Joker Image */
    .joker-container {
      position: relative;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #00ff41;
      box-shadow: 
        0 0 30px rgba(0, 255, 65, 0.3),
        0 0 60px rgba(0, 255, 65, 0.1),
        inset 0 0 30px rgba(0, 255, 65, 0.1);
      animation: pulse-glow 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    .joker-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent 40%,
        rgba(0, 255, 65, 0.1) 50%,
        transparent 60%
      );
      animation: shine 4s linear infinite;
    }

    .joker-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.1) saturate(1.2);
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 30px rgba(0, 255, 65, 0.3), 0 0 60px rgba(0, 255, 65, 0.1); }
      50% { box-shadow: 0 0 50px rgba(0, 255, 65, 0.5), 0 0 100px rgba(0, 255, 65, 0.2); }
    }

    @keyframes shine {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }

    /* Name */
    .name-container {
      text-align: center;
    }
    
    .name-prefix {
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      font-weight: 400;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #00ff4160;
      margin-bottom: 8px;
    }
    
    .name {
      font-size: clamp(1.6rem, 6vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 
        0 0 10px #00ff41,
        0 0 20px #00ff41,
        0 0 40px #00ff41;
      animation: flicker 5s infinite;
      padding: 0 10px;
      word-break: break-word;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.8; }
      94% { opacity: 1; }
      95% { opacity: 0.6; }
      96% { opacity: 1; }
    }

    /* Quote */
    .quote {
      font-family: 'VT323', monospace;
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: #a855f7;
      text-shadow: 
        0 0 10px #a855f7,
        0 0 20px #a855f7;
      letter-spacing: 0.1em;
      position: relative;
      padding: 10px 30px;
      flex-shrink: 0;
    }

    .quote::before,
    .quote::after {
      content: '"';
      font-size: 3rem;
      position: absolute;
      opacity: 0.5;
    }

    .quote::before { left: 0; top: 0; }
    .quote::after { right: 0; bottom: -20px; }

    /* Clock Container */
    .clock-container {
      background: rgba(0, 255, 65, 0.05);
      border: 2px solid #00ff41;
      border-radius: 10px;
      padding: 16px 36px;
      box-shadow: 
        0 0 20px rgba(0, 255, 65, 0.2),
        inset 0 0 30px rgba(0, 255, 65, 0.05);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .clock-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #00ff41, transparent);
    }

    .clock-label {
      font-size: 0.7rem;
      color: #00ff4180;
      letter-spacing: 0.3em;
      margin-bottom: 4px;
      text-align: center;
    }

    .clock-time {
      font-family: 'VT323', monospace;
      font-size: clamp(2.5rem, 10vw, 5rem);
      letter-spacing: 0.1em;
      text-shadow: 
        0 0 10px #00ff41,
        0 0 20px #00ff41,
        0 0 40px #00ff41;
      text-align: center;
      position: relative;
    }

    .clock-time .seconds {
      font-size: 0.6em;
      opacity: 0.7;
      vertical-align: super;
    }

    .clock-date {
      font-family: 'VT323', monospace;
      font-size: clamp(1rem, 3.5vw, 1.5rem);
      letter-spacing: 0.2em;
      margin-top: 4px;
      text-align: center;
      color: #00ff41;
      opacity: 0.9;
    }

    .clock-timezone {
      font-size: 0.75rem;
      color: #00ff4180;
      letter-spacing: 0.2em;
      margin-top: 4px;
      text-align: center;
    }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: #00ff41;
      margin-left: 5px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 8px;
      font-size: 0.6rem;
      color: #00ff4130;
      letter-spacing: 0.2em;
    }

    /* Glitch effect on hover */
    .name:hover {
      animation: glitch 0.3s ease-in-out;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .joker-container {
        width: 200px;
        height: 200px;
      }
      .clock-container {
        padding: 20px 30px;
      }
    }
  </style>
</head>

    <div class="name-container">
      <div class="name-prefix">This is</div>
      <h1 class="name">LeoBritney's Territory</h1>
    </div>
    
    <p class="quote">Why So Serious?<span class="cursor"></span></p>
    
    <div class="clock-container">
      <div class="clock-label">SYSTEM TIME</div>
      <div class="clock-time" id="clock">00:00<span class="seconds">:00</span></div>
      <div class="clock-date" id="date">LOADING...</div>
      <div class="clock-timezone" id="timezone">UTC+0</div>
    </div>
  </div>
  
  <div class="footer">leobritney.top // EST. 2024</div>

  <script>
    // Matrix rain effect
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    const chars = 'LEOBRITNEY01アイウエオカキクケコサシスセソ';
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    
    function drawMatrix() {
      ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#00ff41';
      ctx.font = fontSize + 'px monospace';
      
      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }
    
    setInterval(drawMatrix, 50);
    
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Real-time clock
    function updateClock() {
      const now = new Date();
      
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      document.getElementById('clock').innerHTML = 
        `${hours}:${minutes}<span class="seconds">:${seconds}</span>`;
      
      const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
      const dateStr = now.toLocaleDateString('en-US', options).toUpperCase();
      document.getElementById('date').textContent = dateStr;
      
      const offset = -now.getTimezoneOffset() / 60;
      const sign = offset >= 0 ? '+' : '';
      const tzName = Intl.DateTimeFormat().resolvedOptions().timeZone;
      document.getElementById('timezone').textContent = `${tzName} (UTC${sign}${offset})`;
    }
    
    updateClock();
    setInterval(updateClock, 1000);
  </script>
