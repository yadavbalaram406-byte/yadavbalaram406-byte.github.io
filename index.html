<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>leobritney.top | 我的个人站点</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 50px auto; padding: 0 20px; text-align: center; }
        h1 { color: #2c3e50; }
        p { color: #7f8c8d; font-size: 18px; }
    </style>
</head>
<body>
    <h1>🎉 2026/4/15日！域名绑定成功！leobritney.top 已上线</h1>
    <p>这是我的个人站点，由 GitHub Pages 托管 🚀</p>
    <p>GitHub 用户名：yadavbalaram406-byte</p>
    <p>今天Britney有点郁闷</p>


    <!-- 高级科技感超大时钟 · 渐变蓝黑 · 带发光 · 全屏质感 -->
<div style="
  width: 100%;
  min-height: 50vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
  padding: 40px 20px;
  border-radius: 24px;
  box-sizing: border-box;
  margin: 20px 0;
">
  <div id="time" style="
    font-size: 12vw;
    font-weight: 800;
    background: linear-gradient(90deg, #102a5a, #2563eb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 8px 24px rgba(37, 99, 235, 0.2);
    letter-spacing: 4px;
    line-height: 1.1;
  "></div>

  <div style="
    font-size: 3.2vw;
    font-weight: 600;
    color: #1e40af;
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  ">
    <span id="date"></span>
    <span style="opacity: 0.85;">北京时间 GMT+8</span>
  </div>
</div>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById('time').innerText = now.toLocaleTimeString('zh-CN', {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  });
  document.getElementById('date').innerText = now.toLocaleDateString('zh-CN', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  });
}
updateClock();
setInterval(updateClock, 1000);
</script>


    
</body>
</html>
