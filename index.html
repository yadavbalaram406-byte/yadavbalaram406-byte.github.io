<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 50px auto; padding: 0 20px; text-align: center; }
        h1 { color: #2c3e50; }

<body>
    <h1>🎉 2026/4/15日！域名绑定成功！leobritney.top 已上线</h1>
    <p>这是我的个人站点，由 GitHub Pages 托管 🚀</p>

    <p>今天Britney有点郁闷</p>
    <div id="datetime" style="text-align:center; margin:20px 0; font-size:16px; color:#333;"></div>

<script>
function updateDateTime() {
  let now = new Date();
  document.getElementById('datetime').innerText = 
    now.toLocaleString('zh-CN', {
      year:'numeric',
      month:'2-digit',
      day:'2-digit',
      hour:'2-digit',
      minute:'2-digit',
      second:'2-digit'
    });
}
updateDateTime();
setInterval(updateDateTime, 1000);
</script>
</body>
